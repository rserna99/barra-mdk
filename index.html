<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barra Medikatek</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Barra MDK">
    <link rel="apple-touch-icon" href="img/logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/logo.png">

    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">


    <script src="js/jquery.min.js" defer></script>
    <script src="js/bootstrap.min.js" defer></script>
    <script src="js/main.js" defer></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW actiu:', reg.scope))
                    .catch(err => console.error('SW error:', err));
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <h1 id="titol" class="text-center my-3">
            MEDIKATEK <img src="img/logo.svg" style="width: clamp(96px, 5vw, 48px)" alt="Logo">
        </h1>
        
        <div class="card shadow-sm">
            <ul class="list-group list-group-flush" id="llista_productes">
                
                
            </ul>
        </div>

        <div class="card mt-4 mb-5 p-3 shadow-sm">
            <div class="d-flex align-items-center mb-2">
                <h2 class="h5 w-50 mb-0">EFECTIU</h2>
                <input type="number" min="0" class="form-control w-50" placeholder="Import" id="efectiu_donat">
            </div>
            <div class="d-flex align-items-center mb-3">
                <h2 class="h5 w-50 mb-0">CANVI</h2>
                <input type="text" class="form-control w-50 inp-bold" disabled value="0€" id="canvi_retorn">
            </div>

            <hr>

            <div class="d-flex align-items-center mb-3">
                <h1 class="h3 w-50 mb-0">TOTAL</h1>
                <input type="text" class="form-control form-control-lg w-50 inp-bold" disabled value="0€" id="total">
            </div>

            <div class="d-grid">
                <button class="btn btn-outline-danger btn-lg" id="esborrar">ESBORRAR</button>
            </div>
        </div>
    </div>
</body>
</html>
